# Stage 1 — PlasticESM: domain-adapt ESM-C on the Logan-derived PETadex.
# The PETadex (petadex/catalytic-orfs-90pid) is ~300M plastic-degrading enzyme
# homologs mined from the Logan planetary-scale SRA assembly. Continued
# pretraining with the masked-LM objective produces PlasticESM, the domain-
# adapted backbone used in Stage 2 activity prediction and Stage 3 generation.
# Used by `python -m petabite.mlm_finetune`.
seed: 42
output_dir: outputs/esmc-mlm-lora-bs16-r32

data:
  dataset_id: petadex/catalytic-orfs-90pid   # the dataset pushed from the notebook
  sequence_column: Sequence
  train_split: train
  eval_split: validation
  max_length: 1024
  mlm_probability: 0.15
  num_proc: 8
  # Caps for quick smoke tests; null = use the whole split.
  max_train_samples: null
  max_eval_samples: 5000

model:
  model_id: biohub/ESMC-300M
  trust_remote_code: true
  lora_r: 32
  lora_alpha: 16
  lora_dropout: 0.01
  # PEFT LoRA target: out_proj is the only standard nn.Linear in each block.
  # The QKV and FFN layers are fused (_PyTorchLayerNormLinear / _PyTorchLayerNormMLP)
  # and handled separately via lora_fused below.
  target_modules:
    - out_proj
  # Inject custom LoRA into the fused QKV and FFN modules (not possible via PEFT).
  # Set false to revert to out_proj-only training.
  lora_fused: true

trainer:
  num_train_epochs: 1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  logging_steps: 50
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  bf16: true            # set false (and fp16: true) on older GPUs without bf16
  fp16: false
  gradient_checkpointing: false
  dataloader_num_workers: 4

wandb:
  enabled: true
  project: petabite-esmc
  entity: null          # null = your default W&B entity
  run_name: esmc-300m-lora-mlm-bs16-r32

push_to_hub:
  enabled: false
  repo_id: petadex/esmc-300m-catalytic-lora
  private: false
